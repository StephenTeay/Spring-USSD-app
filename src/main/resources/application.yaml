spring:
  application:
    name: ussd

  datasource:
    url: jdbc:mysql://mysql-db:3306/ussd_banking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect
          format_sql: true
  data:
    redis:
      host: redis-cache
      port: 6379

  session:
    store-type: redis
    timeout: 5m

  server:
    port: 8080

  twilio:
    accountSid: ${TWILIO_SID}
    authToken: ${TWILIO_AUTH}
    phoneNumber: ${TWILIO_NUMBER}


